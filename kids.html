    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;

            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .header a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            opacity: 0.9;
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .header a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .lesson-selector {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .lesson-selector h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .lesson-btn {
            padding: 20px;
            border: 3px solid #ff6b9d;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 600;
            font-size: 1.1em;
            color: #333;
        }

        .lesson-btn:hover {
            background: #ff6b9d;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(255,107,157,0.4);
        }

        .lesson-btn.active {
            background: #c44569;
            color: white;
            border-color: #c44569;
        }

        .lesson-btn .lesson-icon {
            font-size: 2em;
            margin-bottom: 10px;
            display: block;
        }

        .lesson-btn .lesson-count {
            font-size: 0.85em;
            opacity: 0.8;
            margin-top: 5px;
        }

        .flashcard-section {
            display: none;
        }

        .flashcard-section.active {
            display: block;
        }

        .flashcard-container {
            perspective: 1000px;
            margin-bottom: 30px;
        }

        .flashcard {
            width: 100%;
            max-width: 600px;
            height: 400px;
            margin: 0 auto;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .card-front {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
        }

        .card-back {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
            transform: rotateY(180deg);
        }

        .chinese {
            font-size: 80px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .pinyin {
            font-size: 36px;
            margin-bottom: 20px;
            font-weight: 500;
            color: #555;
        }

        .english {
            font-size: 28px;
            line-height: 1.6;
            color: #555;
        }

            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);

            align-items: center;

            margin-right: auto;

            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(255,107,157,0.3);
        }

        .nav-btn {

            padding: 15px;
            background: white;
            color: #ff6b9d;
            border: 2px solid #ff6b9d;
            font-size: 18px;
            font-weight: 600;
        }

        .nav-btn:hover {
            background: #ff6b9d;
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

            color: white;
            text-align: center;
            font-size: 20px;
            margin: 15px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);

            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;

            margin-top: 20px;
            max-width: 600px;
            margin-left: auto;

            font-weight: 600;

            border-radius: 20px;

</head>

        // Parse kids.md format (alternating Chinese/pinyin-English lines)
        function parseKidsMarkdown(text) {
            const lines = text.split('\n');
            const vocab = [];
            
            for (let i = 0; i < lines.length; i += 2) {
                const chineseLine = lines[i]?.trim();
                const pinyinLine = lines[i + 1]?.trim();
                
                if (!chineseLine || !pinyinLine) continue;
                
                const parts = pinyinLine.split('\t');
                if (parts.length >= 2) {
                    const pinyin = parts[0].trim();
                    const english = parts.slice(1).join(' ').trim();
                    
                    if (chineseLine && pinyin && english) {
                        vocab.push({
                            chinese: chineseLine,
                            pinyin: pinyin,
                            english: english
                        });
                    }
                }
            }
            
            return vocab;
        }

        // Load vocabulary data
        function loadVocabulary() {
            try {
                // Try to fetch from server first, fall back to embedded data
                fetch('kids.md')
                    .then(response => {
                        if (response.ok) {
                            return response.text();
                        }
                        throw new Error('Not available');
                    })
                    .then(text => {
                        allVocab = parseKidsMarkdown(text);
                        initializeLessons();
                    })
                    .catch(() => {
                        // Fall back to embedded data
                        allVocab = parseKidsMarkdown(kidsVocabularyData);
                        initializeLessons();
                    });
            } catch (error) {
                // Use embedded data as fallback
                allVocab = parseKidsMarkdown(kidsVocabularyData);
                initializeLessons();
            }
        }

        // Initialize lessons after vocabulary is loaded
        function initializeLessons() {
            // Populate 'all' lesson with all words
            lessonDefinitions.all.words = allVocab.map(v => v.chinese);
            
            // Build lessons object
            for (const [key, lesson] of Object.entries(lessonDefinitions)) {
                // Filter vocabulary
                let vocab = allVocab.filter(v => lesson.words.includes(v.chinese));
                
                // For numbers lesson, maintain the defined order
                if (key === 'numbers') {
                    vocab.sort((a, b) => {
                        const indexA = lesson.words.indexOf(a.chinese);
                        const indexB = lesson.words.indexOf(b.chinese);
                        return indexA - indexB;
                    });
                }
                
                lessons[key] = {
                    name: lesson.name,
                    icon: lesson.icon,
                    vocab: vocab
                };
            }
            
            renderLessons();
        }

        // Render lesson buttons
        function renderLessons() {
            const grid = document.getElementById('lessonsGrid');
            grid.innerHTML = '';
            
            for (const [key, lesson] of Object.entries(lessons)) {
                const btn = document.createElement('button');
                btn.className = 'lesson-btn';
                btn.innerHTML = `
                    <span class="lesson-icon">${lesson.icon}</span>
                    <div>${lesson.name}</div>
                    <div class="lesson-count">${lesson.vocab.length} words</div>
                `;
                btn.addEventListener('click', () => selectLesson(key));
                grid.appendChild(btn);
            }
        }

        // Select a lesson
        function selectLesson(lessonKey) {
            currentLesson = lessonKey;
            currentVocab = [...lessons[lessonKey].vocab];
            currentIndex = 0;
            isRandomized = false;
            
            // Update UI
            document.getElementById('lessonSelector').style.display = 'none';
            document.getElementById('flashcardSection').classList.add('active');
            document.getElementById('lessonInfo').textContent = 
                `${lessons[lessonKey].icon} ${lessons[lessonKey].name} - ${currentVocab.length} words`;
            
            // Hide "Back to Main Flashcards" link when in a lesson
            document.getElementById('backToMainLink').style.display = 'none';
            
            // Update active lesson button
            document.querySelectorAll('.lesson-btn').forEach(btn => btn.classList.remove('active'));
            
            displayCard();
            updateInfo();
            displayVocabList();
            displaySentences();
        }

        // Display vocabulary list
        function displayVocabList() {
            const vocabList = document.getElementById('vocabList');
            vocabList.innerHTML = '';
            
            currentVocab.forEach(item => {
                const vocabItem = document.createElement('div');
                vocabItem.className = 'vocab-item';
                vocabItem.innerHTML = `
                    <div class="chinese-word">${item.chinese}</div>
                    <div class="pinyin-word">${item.pinyin}</div>
                    <div class="english-word">${item.english}</div>
                `;
                vocabList.appendChild(vocabItem);
            });
        }

        // Display sample sentences
        function displaySentences() {
            const sentencesList = document.getElementById('sentencesList');
            sentencesList.innerHTML = '';
            
            let sentences = lessonSentences[currentLesson] || [];
            
            if (sentences.length === 0 && currentLesson === 'all') {
                // For "all" lesson, show sentences from multiple categories
                const allSentences = [];
                Object.values(lessonSentences).forEach(sentList => {
                    if (Array.isArray(sentList) && sentList.length > 0) {
                        allSentences.push(...sentList.slice(0, 2)); // Take 2 from each
                    }
                });
                sentences = allSentences.slice(0, 10);
            }
            
            sentences.slice(0, 10).forEach(sentence => {
                const sentenceItem = document.createElement('div');
                sentenceItem.className = 'sentence-item';
                sentenceItem.innerHTML = `
                    <div class="sentence-chinese">${sentence.chinese}</div>
                    <div class="sentence-pinyin">${sentence.pinyin}</div>
                    <div class="sentence-english">${sentence.english}</div>
                `;
                sentencesList.appendChild(sentenceItem);
            });
        }

        // Display current card
        function displayCard() {
            if (currentVocab.length === 0) {
                document.getElementById('chinese').textContent = 'No words in this lesson';
                return;
            }

            const card = currentVocab[currentIndex];
            document.getElementById('chinese').textContent = card.chinese;
            document.getElementById('pinyin').textContent = card.pinyin;
            document.getElementById('english').textContent = card.english;
            
            // Reset flip state
            document.getElementById('flashcard').classList.remove('flipped');
            
            updateCounter();
        }

        // Next card function
        function nextCard() {
            if (currentVocab.length === 0) return;
            currentIndex = (currentIndex + 1) % currentVocab.length;
            displayCard();
        }

        // Previous card function
        function prevCard() {
            if (currentVocab.length === 0) return;
            currentIndex = (currentIndex - 1 + currentVocab.length) % currentVocab.length;
            displayCard();
        }

        // Update card counter
        function updateCounter() {
            document.getElementById('counter').textContent = 
                `${currentIndex + 1} / ${currentVocab.length}`;
        }

        // Update info display
        function updateInfo() {
            const info = document.getElementById('cardInfo');
            const order = isRandomized ? 'Shuffled' : 'In order';
            info.textContent = `${currentVocab.length} cards • ${order}`;
        }

        // Randomize vocabulary
        function randomize() {
            isRandomized = true;
            for (let i = currentVocab.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentVocab[i], currentVocab[j]] = [currentVocab[j], currentVocab[i]];
            }
            currentIndex = 0;
            displayCard();
            updateInfo();
        }

        // Sort back to original order
        function sortOriginal() {
            isRandomized = false;
            // Restore original order from lesson
            currentVocab = [...lessons[currentLesson].vocab];
            currentIndex = 0;
            displayCard();
            updateInfo();
        }

        // Event listeners
        document.getElementById('flashcard').addEventListener('click', function() {
            this.classList.toggle('flipped');
        });

        document.getElementById('prevBtn').addEventListener('click', prevCard);
        document.getElementById('nextBtn').addEventListener('click', nextCard);

        document.getElementById('randomBtn').addEventListener('click', function() {
            if (isRandomized) {
                sortOriginal();
                this.textContent = '🔀 Shuffle';
            } else {
                randomize();
                this.textContent = '🔤 In Order';
            }
        });

        document.getElementById('backToLessons').addEventListener('click', function() {
            document.getElementById('lessonSelector').style.display = 'block';
            document.getElementById('flashcardSection').classList.remove('active');
            currentLesson = null;
            currentVocab = [];
            
            // Show "Back to Main Flashcards" link again when returning to lesson selector
            document.getElementById('backToMainLink').style.display = 'inline-block';
        });

        // Keyboard navigation
        document.addEventListener('keydown', function(e) {
            if (!currentLesson) return; // Only work when in a lesson
            
            if (e.key === 'ArrowLeft') {
                prevCard();
            } else if (e.key === 'ArrowRight') {
                nextCard();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('flashcard').click();
            }
        });

        // Initialize
        loadVocabulary();
    </script>
